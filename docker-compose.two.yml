# 可选：前后端分两个镜像部署（与原先一致）
# 使用：docker compose -f docker-compose.two.yml up -d

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////app/data/app.db"
    env_file: [.env]
    volumes: [backend-data:/app/data]
    expose: ["8000"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doc-frontend
    restart: unless-stopped
    ports: ["80:80"]
    depends_on:
      backend: { condition: service_healthy }

volumes:
  backend-data:
