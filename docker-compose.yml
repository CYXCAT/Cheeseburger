# 知识库项目：前端(nginx) + 后端(FastAPI)
# 使用方式：在项目根目录执行
#   docker compose up -d
# 访问 http://localhost:80 即可（前端会代理 /api 到后端）
# 后端需配置环境变量：PINECONE_API_KEY、OPENAI_API_KEY 等，可通过 .env 或 compose 的 environment 传入

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc-backend
    restart: unless-stopped
    environment:
      # 数据库持久化到卷，避免容器重建丢失
      DATABASE_URL: "sqlite+aiosqlite:////app/data/app.db"
    env_file:
      - .env
    volumes:
      - backend-data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doc-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
