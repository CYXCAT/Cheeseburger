# 单镜像部署：前端 + 后端在同一容器内（nginx 代理 /api 到 uvicorn）
# 使用：docker compose up -d  访问 http://localhost:80
# 环境变量通过 .env 或下方 environment 传入（PINECONE_API_KEY、OPENAI_API_KEY 等）

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: doc-app:latest
    container_name: doc-app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////app/data/app.db"
    env_file:
      - .env
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  app-data:
